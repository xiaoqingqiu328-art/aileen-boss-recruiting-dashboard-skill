name: I use this skill
description: Tell us how you use the BOSS Recruiting Dashboard Skill
title: "I use this skill: "
labels: ["usage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for using this skill. Please do not share private company names, candidate data, phone numbers, emails, resumes, cookies, API keys, or screenshots with personal information.
  - type: dropdown
    id: workflow
    attributes:
      label: What are you using it for?
      options:
        - Candidate screening dashboard
        - Configurable role templates
        - AI scoring prompts
        - Chrome extension workflow
        - GitHub-safe packaging
        - Other
    validations:
      required: true
  - type: textarea
    id: role
    attributes:
      label: What kind of role are you hiring for?
      description: Optional. Keep it generic and privacy-safe.
      placeholder: Example: customer service, ecommerce operations, sales, finance, admin, technical, or custom role.
    validations:
      required: false
  - type: textarea
    id: outcome
    attributes:
      label: What changed for you?
      description: Share a short, privacy-safe result or use case.
      placeholder: Example: It helped me convert a pasted candidate list into clear screening buckets.
    validations:
      required: false
  - type: textarea
    id: request
    attributes:
      label: What would make it better?
      placeholder: Example: More role templates, more bucket definitions, or safer import workflows.
    validations:
      required: false
